name: Build APK Arm64

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Chọn bản build (Release hoặc Debug)'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK for arm64
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assemble${{ github.event.inputs.variant }} -Darch=arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zalith-2-${{ github.event.inputs.variant }}-arm64
          path: ZalithLauncher/build/outputs/apk/${{ github.event.inputs.variant == 'Release' && 'release' || 'debug' }}/*.apk
