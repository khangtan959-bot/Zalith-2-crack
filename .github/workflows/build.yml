name: Build APK Arm64

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Chọn bản build (Khuyên dùng Debug nếu không có mật khẩu JKS)'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK for arm64
        run: |
          chmod +x gradlew
          # Nếu chọn Release, lệnh này sẽ cố gắng build mà không bắt lỗi signing quá chặt chẽ
          ./gradlew ZalithLauncher:assemble${{ github.event.inputs.variant }} -Darch=arm64 -Pandroid.injected.signing.store.password="" -Pandroid.injected.signing.key.password=""

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zalith-2-${{ github.event.inputs.variant }}-arm64
          path: |
            ZalithLauncher/build/outputs/apk/debug/*.apk
            ZalithLauncher/build/outputs/apk/release/*.apk
